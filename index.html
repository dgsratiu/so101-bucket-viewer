<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SO101 Claw Bucket Viewer</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<main id="app" aria-label="SO101 claw bucket 3D viewer"></main>

<div class="hud">
  <section class="card">
    <div class="title">SO101 claw bucket</div>
    <div class="sub">Source SO101 claw STLs with a jaw-mounted bucket and push-action traces.</div>
  </section>
  <section id="action-status" class="action-status" aria-live="polite">
    <div class="status-label">Action trace</div>
    <div id="action-message" class="status-message">Approach</div>
    <div class="status-steps" aria-hidden="true">
      <span data-step="0"></span>
      <span data-step="1"></span>
      <span data-step="2"></span>
      <span data-step="3"></span>
    </div>
  </section>
  <nav class="buttons" aria-label="Viewer controls">
    <button id="reset" type="button">Reset</button>
    <button id="spin" class="secondary" type="button">Spin</button>
    <label class="toggle">
      <input id="traces" type="checkbox" checked />
      <span>Action traces</span>
    </label>
  </nav>
</div>

<div class="bottom"><span class="pill">Drag rotate · pinch zoom · two-finger pan</span></div>
<pre id="err"></pre>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
  }
}
</script>
<script type="module" src="assets/scripts/viewer.js"></script>
</body>
</html>
